<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>喫茶レトロ - 智慧理財中心</title>
    <style>
        :root { --cafe-brown: #5d4037; --cafe-beige: #efebe9; }
        body { background-color: #fdfaf6; font-family: sans-serif; color: #5d4037; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 10px 15px; cursor: pointer; border: none; background: #ddd; border-radius: 5px; }
        .tab-btn.active { background: var(--cafe-brown); color: white; }
        .content { display: none; }
        .content.active { display: block; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .result { margin-top: 20px; padding: 15px; background: var(--cafe-beige); border-radius: 10px; font-weight: bold; }
        .keyboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-top: 20px; }
        .key { padding: 15px; text-align: center; background: #eee; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h2>喫茶レトロ - 智慧理財中心</h2>
    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('compound')">單筆複利</button>
        <button class="tab-btn" onclick="showTab('periodic')">定期定額</button>
        <button class="tab-btn" onclick="showTab('loan')">貸款試算</button>
        <button class="tab-btn" onclick="showTab('goal')">退休目標</button>
    </div>

    <div id="compound" class="content active">
        <h3>單筆複利計算</h3>
        <input type="number" id="c_principal" placeholder="單筆本金 (元)" onfocus="setActiveInput(this)">
        <input type="number" id="c_rate" placeholder="年利率 (%)" onfocus="setActiveInput(this)">
        <input type="number" id="c_years" placeholder="存款年期 (年)" onfocus="setActiveInput(this)">
        <button onclick="calcCompound()">計算結果</button>
        <div class="result" id="c_result">結果：--</div>
    </div>

    <div id="goal" class="content">
        <h3>退休目標倒推</h3>
        <input type="number" id="g_amount" placeholder="目標總金額" onfocus="setActiveInput(this)">
        <input type="number" id="g_years" placeholder="預計達成年限" onfocus="setActiveInput(this)">
        <button onclick="calcGoal()">試算每月應存</button>
        <div class="result" id="g_result">每月需投入：--</div>
    </div>

    <div class="keyboard">
        <script>
            let activeInput = null;
            function setActiveInput(el) { activeInput = el; }
            function addNum(n) { if(activeInput) activeInput.value += n; }
            function clearInput() { if(activeInput) activeInput.value = ''; }
            
            for(let i=1; i<=9; i++) document.write(`<div class="key" onclick="addNum('${i}')">${i}</div>`);
            document.write(`<div class="key" onclick="addNum('0')">0</div><div class="key" onclick="clearInput()">AC</div>`);
        </script>
    </div>
</div>

<script>
    function showTab(id) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    function calcCompound() {
        let p = parseFloat(document.getElementById('c_principal').value);
        let r = parseFloat(document.getElementById('c_rate').value) / 100;
        let t = parseFloat(document.getElementById('c_years').value);
        let res = p * Math.pow((1 + r), t);
        document.getElementById('c_result').innerText = `本利和總計：${Math.round(res)} 元`;
    }

    function calcGoal() {
        let goal = parseFloat(document.getElementById('g_amount').value);
        let years = parseFloat(document.getElementById('g_years').value);
        let monthlyRate = 0.05 / 12; // 預設5%年化
        let months = years * 12;
        let pmt = goal / (((Math.pow(1 + monthlyRate, months) - 1) / monthlyRate));
        document.getElementById('g_result').innerText = `每月需投資：${Math.round(pmt)} 元`;
    }
</script>

</body>
</html>
