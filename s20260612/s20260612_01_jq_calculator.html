<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box {
            width: 300px;
            height: 300px;
            background-color: lightblue;
            margin: auto;
            margin-top: 20px;
            border-radius: 20px;
        }

        .input-container {
            background-color: lightblue;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
        }

        .output-container {
            background-color: lightpink;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
             height: 50px;
        }

        input{
            width: 80%;
            height: 30px;
            border-radius: 20px;
            text-align: center;
        }
        button{
            width: 50%;
            height: 30px;
            border-radius: 20px;
        }
    </style>
</head>

<body>
    <div class="box input-container">
        <input type="text" name="num1" id="num1" placeholder="num1?">
        <input type="text" name="num2" id="num2" placeholder="num2?">
        <input type="text" name="opt" id="opt" placeholder="opt?">
        <button type="button" id="myBtn">submit</button>
    </div>
    <div class="box output-container">
        <span id="mySpan">1 + 1  = 2</span>
    </div>

</body>

</html>
